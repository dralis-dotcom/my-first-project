name: MemoryMaster
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
targets:
  MemoryMaster:
    type: application
    platform: iOS
    sources: [MemoryMaster]
    info:
      path: MemoryMaster/Info.plist
      properties:
        CFBundleDisplayName: Memory Master
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.example.MemoryMaster
            CFBundleURLSchemes:
              - memorymaster
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MemoryMaster
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MemoryMaster/MemoryMaster.entitlements
    dependencies:
      - target: MemoryMasterWidget

  MemoryMasterWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: MemoryMasterWidget
      - path: MemoryMaster/Data/StreakManager.swift
    info:
      path: MemoryMasterWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MemoryMasterWidget
    entitlements:
      path: MemoryMasterWidget/MemoryMasterWidget.entitlements
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  # UITest target used by `fastlane screenshots` (snapshot) and CI.
  MemoryMasterUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MemoryMasterUITests
    info:
      path: MemoryMasterUITests/Info.plist
      properties:
        CFBundleDisplayName: MemoryMasterUITests
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MemoryMasterUITests
        TEST_HOST: ""                          # UI tests run in a separate process
    dependencies:
      - target: MemoryMaster
